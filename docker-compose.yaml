# docker-compose.yaml
# ====================================== NAXOS ENVIRONMENT =======================================
x-naxos-environment: &naxos_environment
  # # Mandatory Environment Variables
  - NAXOS_POSTGRES_URL=postgresql://naxos:naxos123@postgres:5432/naxos?sslmode=disable
  - NAXOS_NATS_URL=nats://nats:4222
  # # Optional Server Configuration
  # - NAXOS_SERVER_PORT="8080"              # defaults to 8080
  # - NAXOS_SERVER_READ_TIMEOUT="30"        # defaults to 30
  # - NAXOS_SERVER_WRITE_TIMEOUT="30"       # defaults to 30

  # # Optional NATS Configuration
  # - NAXOS_NATS_STREAM_NAME="NAXOS_JOBS"        # defaults to "NAXOS_JOBS"
  # - NAXOS_NATS_SUBJECT="naxos.jobs"             # defaults to "naxos.jobs"
  # - NAXOS_NATS_QUEUE_GROUP="naxos-runners"      # defaults to "naxos-runners"

  # # Optional LevelDB Configuration
  # - NAXOS_LEVELDB_PATH="./data/leveldb"   # defaults to "./data/leveldb"

  # # Optional Worker Configuration
  # - NAXOS_WORKER_MAX_WORKERS="10"         # defaults to 10
  # - NAXOS_WORKER_MAX_RETRIES="3"          # defaults to 3
  # - NAXOS_WORKER_RETRY_DELAY="5"          # defaults to 5
  # - NAXOS_WORKER_SHUTDOWN_TIMEOUT="30"    # defaults to 30

x-naxos-image: &naxos_image naxos:latest
x-naxos-build: &naxos_build .
# ====================================== NAXOS ENVIRONMENT ======================================
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: naxos
      POSTGRES_PASSWORD: naxos123
      POSTGRES_DB: naxos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    networks:
      - naxos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naxos"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    networks:
      - naxos
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: *naxos_image
    build: *naxos_build
    environment: *naxos_environment
    ports:
      - "8080:8080"
    command: /app/api
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - naxos

  runner1:
    image: *naxos_image
    build: *naxos_build
    environment: *naxos_environment
    command: /app/runner
    volumes:
      - leveldb_data1:/app/data/leveldb
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - naxos

  runner2:
    image: *naxos_image
    build: *naxos_build
    environment: *naxos_environment
    command: /app/runner
    volumes:
      - leveldb_data2:/app/data/leveldb
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - naxos

  runner3:
    image: *naxos_image
    build: *naxos_build
    environment: *naxos_environment
    command: /app/runner
    volumes:
      - leveldb_data3:/app/data/leveldb
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - naxos

  runner4:
    image: *naxos_image
    build: *naxos_build
    environment: *naxos_environment
    command: /app/runner
    volumes:
      - leveldb_data4:/app/data/leveldb
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - naxos

volumes:
  postgres_data:
  nats_data:
  leveldb_data1:
  leveldb_data2:
  leveldb_data3:
  leveldb_data4:

networks:
  naxos:
